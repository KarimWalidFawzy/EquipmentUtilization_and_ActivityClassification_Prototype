version: '3.8'

services:
  # --- INFRASTRUCTURE: MESSAGE BROKER ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # --- INFRASTRUCTURE: DATA SINK ---
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=equipment_stats
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # --- MICROSERVICE: CV INFERENCE ENGINE ---
  cv_service:
    build: ./cv_service
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKER=kafka:9092
      - VIDEO_SOURCE=/app/data/construction_video.mp4
    volumes:
      - ./cv_service:/app
      - ./videos:/app/data
    # Uncomment below if you have an NVIDIA GPU and the toolkit installed
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # --- MICROSERVICE: MAIN APP ---
  app:
    build: ./app
    depends_on:
      - kafka
      - timescaledb
    ports:
      - "5000:5000"
    environment:
      - KAFKA_BROKER=kafka:9092
      - DB_URL=postgresql://admin:password123@timescaledb:5432/equipment_stats
    volumes:
      - ./app:/app

  # --- MICROSERVICE: UI & ANALYTICS DASHBOARD ---
  dashboard_ui:
    build: ./ui
    depends_on:
      - kafka
      - timescaledb
      - app
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://app:5000
    volumes:
      - ./ui:/app

networks:
  default:
    name: equipment-network

volumes:
  db_data: